
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In | Multimodal AI</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-branding">
      <div class="brand-content">
        <h1>Multimodal AI</h1>
        <p>Google OAuth secure sign-in</p>
      </div>
    </div>

    <div class="auth-form-container">
      <div class="form-card">
        <div class="form-header">
          <h2>Continue with Google</h2>
          <p>Email/password login is disabled in production mode.</p>
        </div>

        <button id="googleLoginBtn" class="btn-google">
          Continue with Google
        </button>

        <div class="auth-footer">
          <p>Need an account? Use Google sign-in to create one automatically.</p>
        </div>
      </div>

      <div class="loading-spinner" id="loadingSpinner" style="display: none;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
