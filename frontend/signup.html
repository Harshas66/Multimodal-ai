<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Multimodal AI</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-branding">
      <div class="brand-content">
        <h1>Multimodal AI</h1>
        <p>Production authentication is Google-only.</p>
      </div>
    </div>

    <div class="auth-form-container">
      <div class="form-card">
        <div class="form-header">
          <h2>Create Account</h2>
          <p>Accounts are created only through verified Google OAuth.</p>
        </div>

        <button id="googleLoginBtn" class="btn-google">
          Sign up with Google
        </button>

        <div class="auth-footer">
          <p>Already signed up? <a href="index.html" class="auth-link">Go to sign in</a></p>
        </div>
      </div>

      <div class="loading-spinner" id="loadingSpinner" style="display: none;">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
