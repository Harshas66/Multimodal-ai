<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimodal AI | Chat</title>
  <link rel="stylesheet" href="css/chat.css?v=5.0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
</head>
<body>
  <div class="chat-app" id="chatApp">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-row" title="Multimodal AI">
          <div class="brand-mark" aria-hidden="true">
           <!-- <img class="brand-logo" src="frontend/assets/logo.svg" alt="" />-->
          </div>
          <div class="brand-text-wrap">
            <div class="brand-title">Multimodal AI</div>
            <div class="brand-subtitle">Assistant Workspace</div>
          </div>
        </div>
      </div>

      <div class="sidebar-middle">
        <button class="btn btn-primary sidebar-action-btn" id="newChatBtn" type="button" title="New Chat" aria-label="New Chat">
          <span class="sidebar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" />
            </svg>
          </span>
          <span class="sidebar-label">New Chat</span>
        </button>

        <label class="search-wrap" for="chatSearch">
          <span class="search-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="6"></circle>
              <path d="m20 20-3.5-3.5"></path>
            </svg>
          </span>
          <input id="chatSearch" type="text" placeholder="Find chats" autocomplete="off" />
        </label>

        <div class="sidebar-section-label">Recent Chats</div>
        <div class="chat-list" id="chatList"></div>
      </div>

      <div class="sidebar-bottom">
        <a class="bottom-link" href="settings.html" title="Settings" aria-label="Settings">
          <span class="sidebar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5z" />
              <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a1 1 0 0 1 0 1.4l-1.2 1.2a1 1 0 0 1-1.4 0l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a1 1 0 0 1-1 1h-1.7a1 1 0 0 1-1-1v-.2a1 1 0 0 0-.7-.9 1 1 0 0 0-1.1.2l-.1.1a1 1 0 0 1-1.4 0l-1.2-1.2a1 1 0 0 1 0-1.4l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a1 1 0 0 1-1-1v-1.7a1 1 0 0 1 1-1h.2a1 1 0 0 0 .9-.7 1 1 0 0 0-.2-1.1l-.1-.1a1 1 0 0 1 0-1.4l1.2-1.2a1 1 0 0 1 1.4 0l.1.1a1 1 0 0 0 1.1.2 1 1 0 0 0 .6-.9V4a1 1 0 0 1 1-1h1.7a1 1 0 0 1 1 1v.2a1 1 0 0 0 .7.9 1 1 0 0 0 1.1-.2l.1-.1a1 1 0 0 1 1.4 0l1.2 1.2a1 1 0 0 1 0 1.4l-.1.1a1 1 0 0 0-.2 1.1 1 1 0 0 0 .9.6H20a1 1 0 0 1 1 1v1.7a1 1 0 0 1-1 1h-.2a1 1 0 0 0-.9.7Z" />
            </svg>
          </span>
          <span class="sidebar-label">Settings</span>
        </a>
        <button class="bottom-link" id="logoutBtn" type="button" title="Logout" aria-label="Logout">
          <span class="sidebar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <path d="M16 17l5-5-5-5" />
              <path d="M21 12H9" />
            </svg>
          </span>
          <span class="sidebar-label">Logout</span>
        </button>
      </div>
    </aside>

    <button class="sidebar-overlay" id="sidebarOverlay" type="button" aria-label="Close sidebar" hidden></button>

    <main class="chat-main">
      <header class="chat-header">
        <div class="header-left">
          <button class="icon-btn menu-btn" id="mobileSidebarToggle" type="button" aria-label="Toggle sidebar" title="Toggle Sidebar" aria-expanded="true">
            <span></span><span></span><span></span>
          </button>
          <div>
            <h1 id="chatTitle">New Chat</h1>
            <p id="chatSubtitle">Start a conversation</p>
          </div>
        </div>

        <div class="header-right">
          <button class="chip-btn" id="doubtModeBtn" type="button" aria-pressed="false">Doubt: Off</button>
          <button class="chip-btn" id="starredBtn" type="button">Starred</button>
          <div class="ai-status" id="aiStatus" data-state="online">
            <span class="status-dot"></span>
            <span class="status-text">Online</span>
          </div>
        </div>
      </header>

      <section class="messages" id="chatBox">
        <div class="empty-state">
          <h2>No messages yet</h2>
          <p>Ask anything to start a new conversation.</p>
        </div>
      </section>

      <footer class="composer-wrap">
        <div class="composer-shell">
          <div class="composer" id="composer">
            <input type="file" id="imageInput" accept="image/*" hidden />
            <button class="icon-btn composer-icon-btn" id="imageBtn" type="button" aria-label="Upload image">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </button>

            <div class="composer-image" id="composerImage" hidden>
              <img id="composerImagePreview" alt="Selected" />
              <button class="remove-image" id="removeImageBtn" type="button" aria-label="Remove image">x</button>
            </div>

            <div class="composer-input-wrap">
              <textarea id="userInput" rows="1" placeholder="Message Multimodal AI"></textarea>
            </div>

            <button class="icon-btn composer-icon-btn" id="micBtn" type="button" aria-label="Click to speak" title="Click to speak">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3Z" />
                <path d="M19 11a7 7 0 0 1-14 0" />
                <path d="M12 18v3" />
              </svg>
            </button>
            <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 12h13" />
                <path d="m11 5 7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <div class="modal-backdrop" id="starredModal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="starredTitle">
      <div class="modal-head">
        <h3 id="starredTitle">Starred Responses</h3>
        <button class="icon-btn" id="closeStarredBtn" type="button" aria-label="Close">x</button>
      </div>
      <div class="modal-body" id="starredList"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="js/chat.js?v=5.0"></script>
</body>
</html>
