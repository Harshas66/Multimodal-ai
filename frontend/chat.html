<!--frontend/chat.html - Modern Chat Interface-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimodal AI - Chat</title>
  <link rel="stylesheet" href="css/chat.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDiE2DdWfQley8l88Jv2vwsq0OraWjSSJ4",
      authDomain: "silver-agility-475306-r0.firebaseapp.com",
      projectId: "silver-agility-475306-r0",
      storageBucket: "silver-agility-475306-r0.firebasestorage.app",
      messagingSenderId: "1089444754253",
      appId: "1:1089444754253:web:3b06d8e76536dfbae67d04"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    window.firebaseAuth = auth;
  </script>
</head>
<body>

<div class="app-container">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span>Multimodal AI</span>
      </div>
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="chatSearch" placeholder="Search chats..." />
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
    </div>

    <!-- New Chat Button -->
    <button class="btn-new-chat" id="newChat" onclick="createNewChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14"></path>
      </svg>
      New Chat
    </button>

    <!-- Chat List -->
    <div class="chat-list" id="chatList"></div>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <a href="settings.html" class="sidebar-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m3.08-3.08l4.24-4.24"></path>
        </svg>
        Settings
      </a>
      <button class="btn-logout" onclick="logout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CHAT AREA -->
  <main class="chat-container">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <h1 id="chatTitle">New Chat</h1>
        <p id="chatSubtitle" class="header-subtitle">Start a conversation</p>
      </div>
      <div class="header-stats">
        <div class="stat">
          <span class="stat-label">Messages</span>
          <span class="stat-value" id="messageCount">0</span>
        </div>
      </div>
    </header>

    <!-- Chat Messages -->
    <div class="messages-container" id="chatBox">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <h2>No messages yet</h2>
        <p>Start a conversation or select an existing chat to begin</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="input-toolbar">
        <button class="tool-btn" onclick="document.getElementById('imageInput').click()" title="Upload image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        <button class="tool-btn" id="micBtn" onclick="startVoiceInput()" title="Voice input">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
      </div>

      <div class="input-wrapper">
        <textarea 
          id="userInput" 
          class="message-input" 
          placeholder="Type your message... (Shift+Enter for new line)"
          rows="1"
        ></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 C22.9702544,11.6889879 22.9702544,11.6889879 22.9702544,11.6889879 L4.13399899,1.16346707 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.98022414 L3.03521743,10.4212175 C3.03521743,10.5783148 3.03521743,10.7354122 3.50612381,10.7354122 L16.6915026,11.5209 C16.6915026,11.5209 17.1624089,11.5209 17.1624089,12.0493348 C17.1624089,12.5777696 16.6915026,12.4744748 16.6915026,12.4744748 Z"></path>
          </svg>
        </button>
      </div>

      <input type="file" id="imageInput" accept="image/*" hidden />

      <!-- Image Preview -->
      <div class="image-preview" id="imagePreview" style="display: none;">
        <img id="previewImg" alt="Preview" />
        <button class="btn-remove" onclick="removeImagePreview()">✕</button>
      </div>
    </div>
  </main>

  <!-- RIGHT SIDEBAR - AI SETTINGS -->
  <aside class="ai-panel">
    <div class="panel-header">
      <h3>AI Settings</h3>
      <span class="panel-badge">Active</span>
    </div>

    <div class="settings-group">
      <label class="setting-label">Model</label>
      <select id="modelSelect" class="setting-input">
        <option value="llama">LLaMA 3.1 (Recommended)</option>
        <option value="gemini">Google Gemini</option>
        <option value="gpt">OpenAI GPT-3.5</option>
      </select>
    </div>

    <div class="settings-group">
      <label class="setting-label">
        Temperature
        <span class="setting-value" id="tempValue">0.7</span>
      </label>
      <input 
        type="range" 
        id="temperature" 
        min="0" 
        max="1" 
        step="0.1" 
        value="0.7"
        class="setting-slider"
        onchange="updateTempValue(this.value)"
      />
      <small>Higher = more creative, Lower = more focused</small>
    </div>

    <div class="settings-group">
      <label class="setting-label">
        Max Tokens
        <span class="setting-value" id="tokensValue">512</span>
      </label>
      <input 
        type="range" 
        id="maxTokens" 
        min="64" 
        max="2048" 
        step="64" 
        value="512"
        class="setting-slider"
        onchange="updateTokensValue(this.value)"
      />
    </div>

    <div class="divider"></div>

    <div class="action-buttons">
      <button class="btn-action" onclick="exportChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export
      </button>
      <button class="btn-action" onclick="clearChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </svg>
        Clear
      </button>
    </div>
  </aside>
</div>

<script src="js/chat.js"></script>
</body>
</html>
