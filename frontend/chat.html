<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multimodal AI | Chat</title>
  <link rel="stylesheet" href="css/chat.css?v=3.1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
</head>
<body>
  <div class="chat-app" id="chatApp">
    <aside class="sidebar chat-sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="brand-row"><div class="brand-title">Multimodal AI</div></div>
        <button class="new-chat-btn" id="newChatBtn" type="button">New Chat</button>
        <div class="chat-search-wrap"><input id="chatSearch" type="text" placeholder="Search chats" autocomplete="off" /></div>
      </div>
      <div class="chat-list" id="chatList"></div>
      <div class="sidebar-bottom">
        <a class="bottom-link" href="settings.html"><span>Settings</span></a>
        <button class="bottom-link" id="logoutBtn" type="button">Logout</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <div class="header-left">
          <button class="icon-btn mobile-toggle" id="mobileSidebarToggle" type="button" aria-label="Open sidebar"><span></span><span></span><span></span></button>
          <div><h1 id="chatTitle">New Chat</h1><p id="chatSubtitle">Start a conversation</p></div>
        </div>
        <div class="header-right">
          <div class="ai-status" id="aiStatus" data-state="online"><span class="status-dot"></span><span class="status-text">Online</span></div>
        </div>
      </header>

      <section class="messages" id="chatBox">
        <div class="empty-state"><h2>No messages yet</h2><p>Start a new chat to begin.</p></div>
      </section>

      <footer class="composer-wrap">
        <div class="composer" id="composer">
          <input type="file" id="imageInput" accept="image/*" hidden />
          <button class="composer-icon" id="imageBtn" type="button" aria-label="Upload image">+</button>
          <div class="composer-image" id="composerImage" hidden>
            <img id="composerImagePreview" alt="Selected image" />
            <button class="remove-image" id="removeImageBtn" type="button" aria-label="Remove image">x</button>
          </div>
          <textarea id="userInput" rows="1" placeholder="Message Multimodal AI"></textarea>
          <button class="composer-icon" id="micBtn" type="button" aria-label="Voice input">Mic</button>
          <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">Send</button>
        </div>
      </footer>
    </main>
  </div>

  <script type="module" src="js/chat.js?v=3.1"></script>
</body>
</html>
